<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>円形ルーレット抽選</title>

<!-- ★ PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- ★ iOS用アイコン（任意） -->
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  body { font-family: sans-serif; padding: 20px; background: #fafafa; }
  h2 { margin-bottom: 10px; }
  textarea {
    width: 100%; height: 120px;
    padding: 12px; font-size: 18px;
    border-radius: 10px; border: 1px solid #ddd;
    box-sizing: border-box;
  }
  button {
    width: 100%; padding: 14px;
    margin-top: 10px; font-size: 18px;
    border: none; border-radius: 10px;
    background: #4f46e5; color: #fff;
    font-weight: bold;
  }
  #canvasWrap {
    margin-top: 20px;
    display: flex; justify-content: center;
  }
  #result {
    margin-top: 20px; font-size: 28px;
    text-align: center; font-weight: bold;
    min-height: 40px;
  }
  #confettiCanvas {
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<h2>円形ルーレット抽選</h2>

<textarea id="items" placeholder="例：A, B, C または A/B/C または 改行区切り"></textarea>
<button onclick="startRoulette()">抽選する</button>

<div id="canvasWrap">
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<canvas id="confettiCanvas"></canvas>

<div id="result"></div>

<script>
/* ★ Service Worker 登録 */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* -------------------------
   円形ルーレット
------------------------- */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let angle = 0;
let spinning = false;
let sectors = [];
let lastSectorIndex = -1; // カタカタ音用

const colors = ["#ef4444","#f97316","#f59e0b","#10b981","#06b6d4","#3b82f6","#8b5cf6","#ec4899"];

function drawWheel() {
  const total = sectors.length;
  if (total === 0) return;

  const arc = (2 * Math.PI) / total;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  sectors.forEach((item, i) => {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(150, 150);
    ctx.arc(150, 150, 140, start, end);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.closePath();

    ctx.save();
    ctx.translate(150, 150);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px sans-serif";
    ctx.fillText(item, 130, 6);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.moveTo(150, 10);
  ctx.lineTo(140, 30);
  ctx.lineTo(160, 30);
  ctx.fillStyle = "#333";
  ctx.fill();
}

function startRoulette() {
  if (spinning) return;

  const raw = document.getElementById("items").value;
  sectors = raw
    .split(/[\n,\/]/)
    .map(s => s.trim())
    .filter(s => s.length > 0);

  if (sectors.length === 0) {
    document.getElementById("result").textContent = "入力してください";
    return;
  }

  drawWheel();

  spinning = true;
  let speed = 0.35 + Math.random() * 0.25;
  const slowDown = 0.995;

  function rotate() {
    angle += speed;
    speed *= slowDown;

    drawWheel();
    playTickSound(); // ← カタカタ音

    if (speed < 0.002) {
      spinning = false;
      stopAtResult();
      return;
    }

    requestAnimationFrame(rotate);
  }

  rotate();
}

function stopAtResult() {
  const total = sectors.length;
  const arc = (2 * Math.PI) / total;

  const pointerAngle = (3 * Math.PI) / 2;

  let adjusted = (pointerAngle - angle) % (2 * Math.PI);
  if (adjusted < 0) adjusted += 2 * Math.PI;

  const index = Math.floor(adjusted / arc);
  const result = sectors[index];

  document.getElementById("result").textContent = result;

  // 🎉 紙吹雪
  confettiBurst(window.innerWidth / 2, window.innerHeight / 3, 60);

  // 🎵 チーン音
  playDingSound();
}

/* -------------------------
   効果音（WebAudio）
------------------------- */
function playTickSound() {
  const total = sectors.length;
  const arc = (2 * Math.PI) / total;
  const pointerAngle = (3 * Math.PI) / 2;

  let adjusted = (pointerAngle - angle) % (2 * Math.PI);
  if (adjusted < 0) adjusted += 2 * Math.PI;

  const index = Math.floor(adjusted / arc);

  if (index !== lastSectorIndex) {
    lastSectorIndex = index;

    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 900;
      gain.gain.value = 0.0001;
      osc.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      gain.gain.exponentialRampToValueAtTime(0.05, now + 0.01);
      osc.start(now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      osc.stop(now + 0.09);
    } catch (e) {}
  }
}

function playDingSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 1200; // チーンっぽい高音
    gain.gain.value = 0.0001;
    osc.connect(gain);
    gain.connect(ctx.destination);

    const now = ctx.currentTime;
    gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
    osc.start(now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    osc.stop(now + 0.42);
  } catch (e) {}
}

/* -------------------------
   紙吹雪エンジン（軽量）
------------------------- */
const confettiCanvas = document.getElementById("confettiCanvas");
const confettiCtx = confettiCanvas.getContext("2d");
let confettiParticles = [];
let confettiRunning = false;

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function confettiBurst(x, y, count) {
  const colors = ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899'];

  for (let i = 0; i < count; i++) {
    confettiParticles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 10,
      vy: - (4 + Math.random() * 6),
      size: 6 + Math.random() * 10,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 12,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 60 + Math.random() * 60
    });
  }

  if (!confettiRunning) {
    confettiRunning = true;
    requestAnimationFrame(confettiLoop);
  }
}

function confettiLoop() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const p = confettiParticles[i];
    p.life--;
    p.vy += 0.18;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    confettiCtx.restore();

    if (p.life <= 0 || p.y > confettiCanvas.height + 50) {
      confettiParticles.splice(i, 1);
    }
  }

  if (confettiParticles.length > 0) {
    requestAnimationFrame(confettiLoop);
  } else {
    confettiRunning = false;
  }
}
</script>

</body>
</html>
